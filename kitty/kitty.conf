shell zsh
term xterm-kitty

font_family JetBrainsMono Nerd Font Mono
font_size 12.0

# CJK fallback (keep East Asian glyphs in a dedicated CJK mono font)
symbol_map U+3000-U+303F,U+3400-U+4DBF,U+4E00-U+9FFF,U+F900-U+FAFF,U+FF00-U+FFEF Noto Sans Mono CJK SC

window_padding_width 25
background_opacity 0.65

scrollback_lines 10000

cursor_shape beam
cursor_blink_interval 0
cursor_beam_thickness 1.5

# Match foot's primary shortcuts
map page_up scroll_page_up
map page_down scroll_page_down

map ctrl+c copy_or_interrupt

map ctrl+shift+v paste_from_clipboard

map ctrl+f search_scrollback

map ctrl+plus change_font_size all +2.0
map ctrl+equal change_font_size all +2.0
map ctrl+kp_add change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+kp_subtract change_font_size all -2.0
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

# Ctrl+Backspace -> Ctrl+W
map ctrl+backspace send_text all \x17

# Right click paste from clipboard
mouse_map right press ungrabbed paste_from_clipboard

# Disable kitty's default plain-click URL opening behavior
mouse_map left click ungrabbed
mouse_map shift+left click grabbed,ungrabbed

# Ctrl+Left click opens URL/file links
mouse_map ctrl+left press grabbed discard_event
mouse_map ctrl+left release grabbed,ungrabbed mouse_handle_click link

# Command-finish notifications (desktop notification via notification daemon)
shell_integration enabled
notify_on_cmd_finish unfocused 3.0
