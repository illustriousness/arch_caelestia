# 作用：进入 `general` 配置块
general {
    # 作用：窗口布局算法；此处使用 `scrolling`（滚动列式布局）
    layout = scrolling

    # 作用：是否允许撕裂（主要给低延迟游戏场景用）
    allow_tearing = false  # Allows `immediate` window rule to work

    # 作用：工作区之间的外边距
    gaps_workspaces = $workspaceGaps
    # 作用：窗口之间的内间距
    gaps_in = $windowGapsIn
    # 作用：窗口组与屏幕边缘的外间距
    gaps_out = $windowGapsOut
    # 作用：窗口边框宽度
    border_size = $windowBorderSize

    # 作用：活动窗口边框颜色
    col.active_border = $activeWindowBorderColour
    # 作用：非活动窗口边框颜色
    col.inactive_border = $inactiveWindowBorderColour
# 作用：结束当前配置块
}

# 作用：进入 `dwindle` 配置块
dwindle {
	# 作用：保持分割比例，避免切换布局时比例漂移
	preserve_split = true
	# 作用：智能判断新窗口分割方向
	smart_split = false
	# 作用：启用更智能的调整窗口尺寸行为
	smart_resizing = true
# 作用：结束当前配置块
}

# 作用：进入 `master` 配置块
master {
	# 作用：主窗口默认占比（0.64 = 64/36）
	mfact = 0.60
# 作用：结束当前配置块
}


scrolling {
  # 作用：新列默认宽度占屏幕比例（0.5 = 50%）
  column_width = 0.5
  # 作用：为列宽循环预设 3 个挡位：50% / 75% / 100%
  explicit_column_widths = 0.5, 0.75, 1.0
  # 作用：当工作区只剩单列时自动铺满宽度，直接使用 Hyprland scrolling 原生行为
  fullscreen_on_one_column = true
  # 作用：聚焦窗口时自动将其完整滚动到可视区域（1 = fit）
  focus_fit_method = 1
  # 作用：焦点切换时自动跟随滚动到目标窗口
  follow_focus = true
  # 作用：新列默认向右展开（类似从左到右阅读顺序）
  direction = right
}
